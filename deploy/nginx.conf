# /etc/nginx/sites-available/ado-installer.conf  (reference template)
# Replace the example hostname below with your own before deploying.
# Proxies to the Node backend on 127.0.0.1:4180.
# certbot will add the listen 443 / ssl_certificate lines in place after issuance.

server {
    listen 80;
    listen [::]:80;
    server_name installer.example.com;

    location / {
        proxy_pass http://127.0.0.1:4180;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
